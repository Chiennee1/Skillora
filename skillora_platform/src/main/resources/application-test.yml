spring:
  datasource:
    url: jdbc:h2:mem:skillora_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    show-sql: false
  flyway:
    enabled: false
  cache:
    type: simple

management:
  health:
    redis:
      enabled: false

skillora:
  cors:
    allowed-origins:
      - http://localhost:5173
  security:
    jwt:
      issuer: skillora-test
      secret: skillora-test-secret-key-at-least-32-bytes-long
  rate-limit:
    enabled: false

logging:
  level:
    com.example.skillora_platform: DEBUG
    org.springframework.security: WARN
