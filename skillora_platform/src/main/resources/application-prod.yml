spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&serverTimezone=UTC&characterEncoding=utf8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false

skillora:
  cors:
    allowed-origins:
      - ${FRONTEND_URL}
  security:
    jwt:
      issuer: ${JWT_ISSUER:skillora-platform}
      secret: ${JWT_SECRET}

logging:
  level:
    com.example.skillora_platform: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
