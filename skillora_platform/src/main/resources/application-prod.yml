spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&serverTimezone=UTC&characterEncoding=utf8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false
  cache:
    type: redis
  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  health:
    db:
      enabled: true
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:true}
    mail:
      enabled: ${MAIL_HEALTH_ENABLED:true}
  endpoint:
    health:
      validate-group-membership: false
      probes:
        enabled: true
      show-details: when_authorized
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis,mail
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

skillora:
  cors:
    # Production CORS is intentionally restricted to FRONTEND_URL only.
    allowed-origins:
      - ${FRONTEND_URL}
  security:
    jwt:
      issuer: ${JWT_ISSUER:skillora-platform}
      secret: ${JWT_SECRET}

logging:
  level:
    com.example.skillora_platform: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
