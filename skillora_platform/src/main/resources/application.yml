spring:
  config:
    import:
      - optional:file:.env.local[.properties]
      - optional:file:skillora_platform/.env.local[.properties]
  application:
    name: skillora-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false
  cache:
    type: ${CACHE_TYPE:simple}
  data:
    redis:
      repositories:
        enabled: false
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

server:
  servlet:
    context-path: /

management:
  health:
    db:
      enabled: ${DB_HEALTH_ENABLED:true}
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:false}
    mail:
      enabled: ${MAIL_HEALTH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      validate-group-membership: false
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

skillora:
  seed:
    enabled: ${SKILLORA_SEED_ENABLED:false}
    password: ${SKILLORA_SEED_PASSWORD:Skillora@12345}
  auth:
    password-reset-url: ${PASSWORD_RESET_URL:${FRONTEND_URL:http://localhost:3000}/reset-password?token={token}}
  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:3000}
      - http://localhost:3000
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - X-Requested-With
    exposed-headers:
      - Authorization
    max-age: 3600
  security:
    jwt:
      issuer: ${JWT_ISSUER:skillora-platform}
      secret: ${JWT_SECRET:skillora-local-development-secret-32-bytes}
      access-token-ttl: PT15M
      refresh-token-ttl: P7D
  oauth2:
    authorized-redirect-uri: ${OAUTH2_AUTHORIZED_REDIRECT_URI:http://localhost:3000/oauth2/redirect}
  video:
    bunny:
      library-id: ${BUNNY_LIBRARY_ID:}
      api-key: ${BUNNY_API_KEY:}
      tus-endpoint: ${BUNNY_TUS_ENDPOINT:https://video.bunnycdn.com/tusupload}
      upload-expiration: ${BUNNY_UPLOAD_EXPIRATION:PT24H}
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      temperature: ${GEMINI_TEMPERATURE:0.4}
      max-output-tokens: ${GEMINI_MAX_OUTPUT_TOKENS:1024}
  payment:
    enabled: ${PAYMENT_ENABLED:true}
    public-base-url: ${PUBLIC_API_BASE_URL:http://localhost:8080}
    result-url: ${PAYMENT_RESULT_URL:${FRONTEND_URL:http://localhost:3000}/payment/result}
    ipn:
      whitelist-enabled: ${PAYMENT_IPN_WHITELIST_ENABLED:false}
      vnpay-allowed-ips: ${VNPAY_IPN_ALLOWED_IPS:}
      momo-allowed-ips: ${MOMO_IPN_ALLOWED_IPS:}
    vnpay:
      tmn-code: ${VNPAY_TMN_CODE:}
      hash-secret: ${VNPAY_HASH_SECRET:}
      payment-url: ${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      locale: ${VNPAY_LOCALE:vn}
      order-type: ${VNPAY_ORDER_TYPE:other}
    momo:
      partner-code: ${MOMO_PARTNER_CODE:}
      access-key: ${MOMO_ACCESS_KEY:}
      secret-key: ${MOMO_SECRET_KEY:}
      endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
      request-type: ${MOMO_REQUEST_TYPE:payWithMethod}
      partner-name: ${MOMO_PARTNER_NAME:Skillora}
      store-id: ${MOMO_STORE_ID:SkilloraStore}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    window: ${RATE_LIMIT_WINDOW:PT1M}
    auth-limit: ${RATE_LIMIT_AUTH:30}
    reset-password-limit: ${RATE_LIMIT_RESET_PASSWORD:5}
    chat-limit: ${RATE_LIMIT_CHAT:30}
    payment-limit: ${RATE_LIMIT_PAYMENT:120}
