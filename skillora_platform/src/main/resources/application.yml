spring:
  application:
    name: skillora-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false

server:
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

skillora:
  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:5173}
      - http://localhost:3000
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - X-Requested-With
    exposed-headers:
      - Authorization
    max-age: 3600
  security:
    jwt:
      issuer: ${JWT_ISSUER:skillora-platform}
      secret: ${JWT_SECRET:skillora-local-development-secret-32-bytes}
      access-token-ttl: PT15M
      refresh-token-ttl: P7D
  oauth2:
    authorized-redirect-uri: ${OAUTH2_AUTHORIZED_REDIRECT_URI:http://localhost:5173/oauth2/redirect}
  video:
    bunny:
      library-id: ${BUNNY_LIBRARY_ID:}
      api-key: ${BUNNY_API_KEY:}
      tus-endpoint: ${BUNNY_TUS_ENDPOINT:https://video.bunnycdn.com/tusupload}
      upload-expiration: ${BUNNY_UPLOAD_EXPIRATION:PT24H}
