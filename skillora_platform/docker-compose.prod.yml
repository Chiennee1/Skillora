# Usage: docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d
# Production override: run backend + frontend behind Nginx with stricter restart/logging/resource settings.

services:
  app:
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      PASSWORD_RESET_URL: ${PASSWORD_RESET_URL:?PASSWORD_RESET_URL is required}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:?PUBLIC_API_BASE_URL is required}
      PAYMENT_RESULT_URL: ${PAYMENT_RESULT_URL:?PAYMENT_RESULT_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required and must be at least 32 characters}
      MAIL_HEALTH_ENABLED: "true"
      REDIS_HEALTH_ENABLED: "true"
      DB_HEALTH_ENABLED: "true"
      PAYMENT_IPN_WHITELIST_ENABLED: ${PAYMENT_IPN_WHITELIST_ENABLED:-true}
      VNPAY_IPN_ALLOWED_IPS: ${VNPAY_IPN_ALLOWED_IPS:?VNPAY_IPN_ALLOWED_IPS is required when production IP whitelist is enabled}
      MOMO_IPN_ALLOWED_IPS: ${MOMO_IPN_ALLOWED_IPS:?MOMO_IPN_ALLOWED_IPS is required when production IP whitelist is enabled}
      JAVA_OPTS: >-
        -XX:MaxRAMPercentage=75
        -XX:+UseG1GC
        -XX:+ExitOnOutOfMemoryError
        -Duser.timezone=Asia/Ho_Chi_Minh
    deploy:
      resources:
        limits:
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ../skillora_web
      dockerfile: Dockerfile
    container_name: skillora-frontend
    environment:
      API_BASE_URL: http://app:8080
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:?PUBLIC_API_BASE_URL is required}
      NEXT_PUBLIC_APP_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:1.27-alpine
    container_name: skillora-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
